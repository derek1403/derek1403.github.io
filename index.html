<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的筆記總覽</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            
            /* --- 背景圖片設定開始 --- */
            background-image: url('./item/Cat_and_Dog_pic.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            /* --- 背景圖片設定結束 --- */
            
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 90%; 
            background-color: rgba(255, 255, 255, 0.9); 
            padding: 40px;
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); 
            
            /* 讓內容在卡片內有更好的上下空間分配 */
            margin: 40px 0; 
        }

        h1 { 
            text-align: center; 
            color: #333;
            margin-top: 0;
            margin-bottom: 30px;
        }

        /* 新增：次級標題的樣式，用來區分不同區塊 */
        h2 {
            color: #444;
            font-size: 1.4em;
            border-bottom: 2px solid #007bff; /* 藍色底線，增加層次感 */
            padding-bottom: 5px;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        /* 新增：文字描述的樣式 */
        p.description {
            color: #666;
            font-size: 0.95em;
            margin-top: 0;
            margin-bottom: 15px;
        }

        ul { 
            list-style: none; 
            padding: 0; 
            margin-bottom: 30px; /* 讓列表底部留白，與下一個標題隔開 */
        }

        li { 
            margin: 15px 0; 
            border-bottom: 1px dashed #ccc; 
            padding-bottom: 10px;
        }

        a {
            text-decoration: none;
            color: #007bff;
            font-size: 1.2em;
            display: block; 
            transition: color 0.3s, padding-left 0.3s; /* 將 padding-left 也加入過渡效果，會更滑順 */
        }

        a:hover {
            color: #0056b3;
            padding-left: 10px;
        }

        /* 隨機經典文句 */
        blockquote.quote {
            margin: 0 0 30px 0;
            padding: 15px 20px;
            border-left: 4px solid #007bff;
            background-color: rgba(0, 123, 255, 0.06);
            border-radius: 0 8px 8px 0;
            color: #333;
            font-size: 1.15em;
            font-style: italic;
            text-align: center;
            min-height: 1.6em;
            transition: opacity 0.4s;
        }

        /* 文句內的連結：與周圍文字同大小，維持行內排版 */
        blockquote.quote a {
            display: inline;
            font-size: inherit;
            font-style: inherit;
        }

        blockquote.quote a:hover {
            padding-left: 0;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>我的筆記總覽</h1>

        <blockquote class="quote" id="randomQuote"></blockquote>

        <h2>貓探長 🐈🕵️</h2>
        <p class="description">旺旺 筆記整理：</p>
        <ul>
            <li><a href="./Control-System/_build/html/index.html" target="_blank">Control System (控制系統)</a></li>
            <li><a href="./Math-Derivations/_build/html/intro.html" target="_blank">Math Derivations (數學推導)</a></li>
            <li><a href="./Theory_Playground/_build/html/intro.html" target="_blank">Theory Playground (理論遊樂場)</a></li>
            <li><a href="https://derek1403.github.io/PC-NTU/Chaos%20and%20Predictability/hw1/Chaos_hw1.html" target="_blank">測試主題 ：CP (混沌與可預測性)</a></li>
        </ul>

        <h2>狗勾好朋友 🐕</h2>
        <p class="description">喵喵 筆記整理：</p>
        <ul>
            <li><a href="https://derek1403.github.io/PC-NTU/Advanced-Atmospheric-Dynamics/_build/html/lecture/lecture.html" target="_blank">高等大氣動力學 (Advanced Atmospheric Dynamics)</a></li>
            <li><a href="https://derek1403.github.io/PC-NTU/Cryptography/_build/html/homework/Cryptography_2026_Assignment.html" target="_blank">密碼學 (Cryptography)</a></li>
            <li><a href="https://derek1403.github.io/PC-NTU/Modern-Physics/_build/html/lecture/lecture.html" target="_blank">近代物理 (Modern Physics)</a></li>
            <li><a href="https://derek1403.github.io/PC-NTU/Typhoon-Dynamics/_build/html/lecture/lecture.html" target="_blank">颱風動力 (Typhoon Dynamics)</a></li>
            
        </ul>
    </div>

    <script>
        // 載入時隨機挑選一句 "---" 之前的經典文句
        fetch('./item/Kaleidoscopic_Remembrance.txt')
            .then(function (res) { return res.text(); })
            .then(function (text) {
                var quotes = text
                    .split('---')[0]            // 只取 --- 之前的部分
                    .split(/\r?\n/)             // 逐行拆分
                    .map(function (line) { return line.trim(); })
                    .filter(function (line) { return line.length > 0; });

                var el = document.getElementById('randomQuote');
                if (quotes.length === 0) {
                    el.style.display = 'none';
                    return;
                }
                var quote = quotes[Math.floor(Math.random() * quotes.length)];
                el.innerHTML = renderMarkdown(quote);
            })
            .catch(function () {
                document.getElementById('randomQuote').style.display = 'none';
            });

        // 簡易 Markdown 渲染：支援超連結 [文字](網址) 與粗體 **文字**
        function renderMarkdown(text) {
            // 先做 HTML 轉義，避免內容中的特殊字元造成問題
            var html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            // 連結：[文字](網址)
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
                '<a href="$2" target="_blank">$1</a>');
            // 粗體：**文字**
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            return html;
        }
    </script>
</body>
</html>
