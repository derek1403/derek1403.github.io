<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的筆記總覽</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            
            /* --- 背景圖片設定開始 --- */
            background-image: url('./item/Cat_and_Dog_pic.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            /* --- 背景圖片設定結束 --- */
            
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 90%; 
            background-color: rgba(255, 255, 255, 0.9); 
            padding: 40px;
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); 
            
            /* 讓內容在卡片內有更好的上下空間分配 */
            margin: 40px 0; 
        }

        h1 { 
            text-align: center; 
            color: #333;
            margin-top: 0;
            margin-bottom: 30px;
        }

        /* 新增：次級標題的樣式，用來區分不同區塊 */
        h2 {
            color: #444;
            font-size: 1.4em;
            border-bottom: 2px solid #007bff; /* 藍色底線，增加層次感 */
            padding-bottom: 5px;
            margin-top: 30px;
            margin-bottom: 10px;
        }

        /* 新增：文字描述的樣式 */
        p.description {
            color: #666;
            font-size: 0.95em;
            margin-top: 0;
            margin-bottom: 15px;
        }

        ul { 
            list-style: none; 
            padding: 0; 
            margin-bottom: 30px; /* 讓列表底部留白，與下一個標題隔開 */
        }

        li { 
            margin: 15px 0; 
            border-bottom: 1px dashed #ccc; 
            padding-bottom: 10px;
        }

        a {
            text-decoration: none;
            color: #007bff;
            font-size: 1.2em;
            display: block; 
            transition: color 0.3s, padding-left 0.3s; /* 將 padding-left 也加入過渡效果，會更滑順 */
        }

        a:hover { 
            color: #0056b3; 
            padding-left: 10px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>我的筆記總覽</h1>

        <h2>貓探長 🐈🕵️</h2>
        <p class="description">旺旺 筆記整理：</p>
        <ul>
            <li><a href="./Control-System/_build/html/index.html" target="_blank">Control System (控制系統)</a></li>
            <li><a href="./Math-Derivations/_build/html/intro.html" target="_blank">Math Derivations (數學推導)</a></li>
            <li><a href="./Theory_Playground/_build/html/intro.html" target="_blank">Theory Playground (理論遊樂場)</a></li>
            <li><a href="https://derek1403.github.io/PC-NTU/Chaos%20and%20Predictability/hw1/Chaos_hw1.html" target="_blank">測試主題 ：CP (混沌與可預測性)</a></li>
        </ul>

        <h2>狗勾好朋友 🐕</h2>
        <p class="description">喵喵 筆記整理：</p>
        <ul>
            <li><a href="https://derek1403.github.io/PC-NTU/Advanced-Atmospheric-Dynamics/_build/html/lecture/lecture.html" target="_blank">高等大氣動力學 (Advanced Atmospheric Dynamics)</a></li>
            <li><a href="https://derek1403.github.io/PC-NTU/Cryptography/_build/html/lecture/Algebra/Abstract_Algebra/Group.html" target="_blank">密碼學 (Cryptography)</a></li>
            <li><a href="https://derek1403.github.io/PC-NTU/Modern-Physics/_build/html/lecture/lecture.html" target="_blank">近代物理 (Modern Physics)</a></li>
        </ul>
    </div>
</body>
</html>
